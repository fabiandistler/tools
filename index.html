<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tools</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        ul { line-height: 1.6; }
        a { text-decoration: none; color: #0366d6; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>HTML Tools</h1>
    <ul id="tool-list">
        <li>Loading Tools...</li>
    </ul>

    <script>
        // TRAGE HIER DEINE DATEN EIN:
        const GITHUB_USER = 'fabiandistler'; 
        const GITHUB_REPO = 'tools';

        async function loadTools() {
            const listElement = document.getElementById('tool-list');
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                if (!response.ok) throw new Error('API limit erreicht oder Repo nicht gefunden');
                
                const files = await response.json();
                listElement.innerHTML = ''; // "Lade Tools..." entfernen

                // Filtere nach .html Dateien, ignoriere aber die index.html selbst
                const htmlFiles = files.filter(file => file.name.endsWith('.html') && file.name !== 'index.html');

                if (htmlFiles.length === 0) {
                    listElement.innerHTML = '<li>Noch keine Tools vorhanden.</li>';
                    return;
                }

                htmlFiles.forEach(file => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = file.name;
                    // Mache den Namen hübscher (entferne .html und ersetze Bindestriche)
                    a.textContent = file.name.replace('.html', '').replace(/-/g, ' ');
                    li.appendChild(a);
                    listElement.appendChild(li);
                });
            } catch (error) {
                listElement.innerHTML = `<li style="color: red;">Fehler beim Laden: ${error.message}</li>`;
            }
        }

        loadTools();
    </script>
</body>
</html>
