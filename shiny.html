<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebR Interactive Studio</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --panel-bg: #252526;
      --fg: #d4d4d4;
      --accent: #007acc;
      --accent-hover: #005f9e;
      --border: #3c3c3c;
      --success: #89d185;
      --error: #f48771;
      --font-mono: Consolas, "Courier New", monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background-color: var(--panel-bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-bar {
      font-size: 0.9rem;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--fg);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      display: inline-block;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .panel:last-child {
      border-right: none;
    }

    .panel-header {
      background-color: #2d2d2d;
      padding: 8px 15px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    textarea {
      flex: 1;
      background-color: #1e1e1e;
      color: #9cdcfe;
      border: none;
      padding: 15px;
      font-family: var(--font-mono);
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
    }

    .output-area {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      background-color: var(--bg);
    }

    .plot-container {
      padding: 20px;
      min-height: 300px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff; /* Weiß für bessere Kontraste bei R Plots */
    }

    .plot-container svg {
      max-width: 100%;
      height: auto;
    }

    .console-output {
      padding: 15px;
      font-family: var(--font-mono);
      font-size: 13px;
      color: #ce9178;
      white-space: pre-wrap;
      flex: 1;
    }

    button {
      background-color: var(--accent);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    button:disabled {
      background-color: var(--border);
      color: #888;
      cursor: not-allowed;
    }

    .secondary-btn {
      background-color: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
    }

    .secondary-btn:hover {
      background-color: rgba(255,255,255,0.1);
    }

    .empty-plot {
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>

  <header>
    <h1><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path></svg> WebR Studio</h1>
    <div class="status-bar">
      <span id="status-text">Lade WebR (ca. 20MB, initial)...</span>
      <div id="spinner" class="spinner"></div>
      <button id="run-btn" disabled>Code Ausführen (Cmd+Enter)</button>
    </div>
  </header>

  <div class="main-container">
    <!-- Editor Panel -->
    <div class="panel">
      <div class="panel-header">R Skript</div>
      <textarea id="code-editor" spellcheck="false" placeholder="Schreibe deinen R Code hier..."></textarea>
    </div>

    <!-- Output Panel -->
    <div class="panel">
      <div class="panel-header">
        Output
        <button id="download-btn" class="secondary-btn" style="padding: 3px 8px; font-size: 0.75rem; display: none;" onclick="downloadPlot()">SVG Download</button>
      </div>
      <div class="output-area">
        <div id="plot-output" class="plot-container">
          <span class="empty-plot">Plot erscheint hier...</span>
        </div>
        <div id="console-output" class="console-output">Konsole wartet...</div>
      </div>
    </div>
  </div>

  <!-- WebR Integration (Dynamischer Import für besseres Error Handling) -->
  <script type="module">
    const statusEl = document.getElementById('status-text');
    const spinnerEl = document.getElementById('spinner');
    const runBtn = document.getElementById('run-btn');
    const codeEditor = document.getElementById('code-editor');
    const plotOutput = document.getElementById('plot-output');
    const consoleOutput = document.getElementById('console-output');
    const downloadBtn = document.getElementById('download-btn');

    let webR;

    // Default Code
    const defaultCode = `# Generiere Beispieldaten
set.seed(42)
x <- rnorm(200)
y <- x * 2 + rnorm(200, sd = 1.5)

# 1. Plot zeichnen
par(mar=c(4,4,2,1))
plot(x, y, 
     pch = 16, 
     col = rgb(0.2, 0.6, 0.8, 0.6),
     main = "Lineare Regression in WebR",
     xlab = "Unabhängige Variable",
     ylab = "Abhängige Variable")

# Regressionslinie hinzufügen
fit <- lm(y ~ x)
abline(fit, col = "red", lwd = 2)

# 2. Konsolen-Output generieren
cat("Zusammenfassung des Modells:\\n")
summary(fit)`;

    // Auto-Save laden
    const savedCode = localStorage.getItem('webr_studio_code');
    codeEditor.value = savedCode || defaultCode;

    codeEditor.addEventListener('input', () => {
      localStorage.setItem('webr_studio_code', codeEditor.value);
    });

    // WebR initialisieren
    async function initWebR() {
      // 1. Check auf lokale Ausführung ohne Server
      if (window.location.protocol === 'file:') {
        statusEl.innerText = "Fehler: file:// Protokoll blockiert WebR.";
        statusEl.style.color = "var(--error)";
        spinnerEl.style.display = "none";
        consoleOutput.innerHTML = `<span style="color:var(--error); font-size:1.1em;">⚠️ <b>Sicherheitsrichtlinie des Browsers blockiert WebR</b></span>\n\nDu hast die Datei direkt von der Festplatte (file://) geöffnet. WebAssembly und Web Worker benötigen aus Sicherheitsgründen einen lokalen Webserver.\n\n<b>Lösung:</b>\n1. Öffne die Datei in VS Code und nutze die Erweiterung "Live Server".\n2. Oder nutze Python im Terminal: <code>python -m http.server</code>\n3. Oder nutze Node.js im Terminal: <code>npx serve</code>`;
        return;
      }

      try {
        statusEl.innerText = "Lade WebR Modul (CDN)...";
        
        // Dynamischer Import, fängt Netzwerk/CORS Fehler beim Laden ab
        const module = await import('https://webr.r-wasm.org/latest/webr.mjs');
        const WebR = module.WebR;
        
        statusEl.innerText = "Initialisiere WebAssembly (10-20MB)...";
        webR = new WebR();
        await webR.init();
        
        statusEl.innerText = "WebR Bereit";
        statusEl.style.color = "var(--success)";
        spinnerEl.style.display = "none";
        runBtn.disabled = false;
        
        // Führe initialen Code direkt aus
        await runRCode();
      } catch (err) {
        statusEl.innerText = "Kritischer Fehler beim Laden.";
        statusEl.style.color = "var(--error)";
        spinnerEl.style.display = "none";
        consoleOutput.innerHTML = `<span style="color:var(--error)"><b>Fehler beim Initialisieren:</b>\n${err.name}: ${err.message}\n\n${err.stack || ''}</span>\n\nMöglicher Grund: Der Browser/das Preview-Fenster blockiert Cross-Origin Web Worker oder WebAssembly. Lade die Datei herunter und öffne sie lokal über einen Webserver.`;
      }
    }

    // Code ausführen
    async function runRCode() {
      if (!webR) return;
      
      const code = codeEditor.value;
      if (!code.trim()) return;

      runBtn.disabled = true;
      statusEl.innerText = "Berechne...";
      statusEl.style.color = "var(--fg)";
      spinnerEl.style.display = "inline-block";
      consoleOutput.innerText = "Führe aus...";
      plotOutput.innerHTML = '<span class="empty-plot">Generiere Plot...</span>';
      downloadBtn.style.display = "none";

      try {
        // Alte Dateien aufräumen, ignoriere Fehler falls Datei nicht existiert
        try { await webR.FS.unlink('/tmp/plot.svg'); } catch(e) {}

        // User Code in eine virtuelle R-Datei schreiben
        await webR.FS.writeFile('/tmp/script.R', code);

        // R Wrapper: Fängt Errors, speichert SVG und gibt Console-Output zurück
        const wrapperCode = `
          .out <- capture.output({
            svg("/tmp/plot.svg", width=7, height=5)
            tryCatch({
              source('/tmp/script.R', local=TRUE)
            }, error = function(e) {
              cat("FEHLER IN R:", e$message, "\\n")
            })
            invisible(dev.off())
          })
          paste(.out, collapse="\\n")
        `;

        // R Code evaluieren
        const result = await webR.evalRString(wrapperCode);
        
        // Konsole füllen
        consoleOutput.innerText = result.trim() || "Erfolgreich ausgeführt (Kein Konsolen-Output).";

        // SVG Plot auslesen
        try {
          const svgData = await webR.FS.readFile('/tmp/plot.svg');
          const svgText = new TextDecoder().decode(svgData);
          
          // Ein leeres SVG-Gerüst von R ist ca. 300 Bytes groß
          if (svgText.length > 500) {
            plotOutput.innerHTML = svgText;
            downloadBtn.style.display = "block";
          } else {
            plotOutput.innerHTML = '<span class="empty-plot">Dieser Code generiert keinen Plot.</span>';
          }
        } catch(e) {
          plotOutput.innerHTML = '<span class="empty-plot">Fehler beim Auslesen des Plots.</span>';
        }

      } catch (err) {
        consoleOutput.innerText = "Systemfehler in JavaScript:\\n" + err.name + ": " + err.message + "\\n\\n" + (err.stack || "");
      }

      runBtn.disabled = false;
      statusEl.innerText = "WebR Bereit";
      statusEl.style.color = "var(--success)";
      spinnerEl.style.display = "none";
    }

    // Events binden
    runBtn.addEventListener('click', runRCode);
    
    // Tastenkürzel für Code-Ausführung (Cmd/Ctrl + Enter)
    codeEditor.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runRCode();
      }
    });

    // Start
    initWebR();

    // Plot Download Funktion
    window.downloadPlot = function() {
      const svgContent = plotOutput.innerHTML;
      if (!svgContent.includes('<svg')) return;
      
      const blob = new Blob([svgContent], {type: 'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'webr_plot.svg';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };
  </script>
</body>
</html>
